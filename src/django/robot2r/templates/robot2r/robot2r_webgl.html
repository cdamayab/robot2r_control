<!DOCTYPE html>
<html lang="en">
<head>
    <title>Robot 2R - Three.js</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Elimina scroll */
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
        .controls label {
            display: block;
            margin-bottom: 5px;
            font-family: Arial, sans-serif;
        }
        .controls input {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.134.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="controls">
        <label for="theta1">Theta 1 (°):</label>
        <input id="theta1" type="range" min="0" max="360" value="0">
        <label for="theta2">Theta 2 (°):</label>
        <input id="theta2" type="range" min="0" max="360" value="0">
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let joint1, joint2, gridHelper, plane;
        let link1Length = 5; // Longitud inicial del eslabón 1
        let link2Length = 6; // Longitud inicial del eslabón 2
        let gridSize = 1; // Tamaño de cada celda en la grilla

        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            // Cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 30);

            // Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Controles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;

            // Luz
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 10, 10).normalize();
            scene.add(light);

            // Sistema de referencia XYZ
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            // Material
            const material = new THREE.MeshStandardMaterial({ color: 0xff6347, metalness: 0.5, roughness: 0.5 });

            // Base
            const baseGeometry = new THREE.CylinderGeometry(2, 2, 1, 32);
            const base = new THREE.Mesh(baseGeometry, material);
            scene.add(base);

            // Eslabón corto horizontal
            const baseLinkGeometry = new THREE.CylinderGeometry(0.5, 0.5, 4, 32);
            const baseLink = new THREE.Mesh(baseLinkGeometry, material);
            baseLink.position.y = 2;
            base.add(baseLink);

            // Articulación 1
            const joint1Geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
            joint1 = new THREE.Mesh(joint1Geometry, material);
            joint1.rotation.z = Math.PI / 2;
            joint1.position.y = 2;
            baseLink.add(joint1);

            // Eslabón 1
            const link1Geometry = new THREE.CylinderGeometry(0.4, 0.4, link1Length, 32);
            const link1 = new THREE.Mesh(link1Geometry, material);
            link1.rotation.z = Math.PI / 2;
            link1.position.x = link1Length / 2;
            joint1.add(link1);

            // Articulación 2
            const joint2Geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
            joint2 = new THREE.Mesh(joint2Geometry, material);
            joint2.rotation.z = Math.PI / 2;
            joint2.position.y = -link1Length/2;
            link1.add(joint2);

            // Eslabón 2
            const link2Geometry = new THREE.CylinderGeometry(0.4, 0.4, link2Length, 32);
            const link2 = new THREE.Mesh(link2Geometry, material);
            link2.rotation.z = Math.PI / 2;
            link2.position.x = -link2Length / 2;
            joint2.add(link2);
            
            // Crear un grupo para el plano y las grillas
            const planeGroup = new THREE.Group();
            scene.add(planeGroup);

            // Plano base con grilla dinámica
            const planeSize = 2 * (4 + link1Length + link2Length);
            const planeGeometry = new THREE.PlaneGeometry(planeSize, planeSize);
            const planeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            planeGroup.add(plane);

            // Grilla fina
            gridHelper = new THREE.GridHelper(planeSize, planeSize / gridSize, 0x0000ff, 0x808080);
            gridHelper.position.set(0, 0.01, 0); // Ligeramente por encima del plano
            planeGroup.add(gridHelper);
            
            // Grilla gruesa
            const coarseGridSize = gridSize * 5; // Tamaño de la celda más grande
            const coarseGridHelper = new THREE.GridHelper(planeSize, planeSize / coarseGridSize, 0xff0000, 0x000000);
            coarseGridHelper.position.set(0, 0.02, 0); // Ligeramente por encima de la grilla fina
            coarseGridHelper.material.linewidth = 100; // Aumentar el grosor
            planeGroup.add(coarseGridHelper);
            
            planeGroup.rotation.z = -Math.PI / 2;
            planeGroup.position.set(-2, 0, 0); // Ligeramente por debajo de la vista cinematica

            // Listeners para sliders
            const theta1Slider = document.getElementById('theta1');
            const theta2Slider = document.getElementById('theta2');

            theta1Slider.addEventListener('input', () => {
                const theta1 = THREE.MathUtils.degToRad(theta1Slider.value);
                joint1.rotation.x = theta1;
            });

            theta2Slider.addEventListener('input', () => {
                const theta2 = THREE.MathUtils.degToRad(theta2Slider.value);
                joint2.rotation.x = theta2;
            });

            // Animación
            animate();
        }

        // Redimensionar ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animación
        function animate() {
            requestAnimationFrame(animate);

            // Actualizar controles y renderizar
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
